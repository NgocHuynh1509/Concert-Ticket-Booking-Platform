<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thanh Toán - Checkout</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .checkout-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 24px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            background: #fff;
            color: #333;
        }
        .ticket-summary, .price-summary {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .price-row.total {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4caf50;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 8px;
            margin-bottom: 0;
        }
        .hold-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 152, 0, 0.15);
            border: 1px solid rgba(255, 152, 0, 0.4);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .hold-status.error {
            background: rgba(229, 57, 53, 0.15);
            border-color: rgba(229, 57, 53, 0.4);
        }
        .hold-status .time { font-weight: bold; color: #ff9800; }
        .error-msg { color: #ff4d4d; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
<div class="header">
    <h1>ConcertBooking - Checkout</h1>
</div>

<div class="checkout-container">
    <h2>Xác nhận đặt vé</h2>

    <div class="ticket-summary">
        <h3 id="ticket-name">Đang tải thông tin vé...</h3>
        <p>Đơn giá: <span id="ticket-price">0</span> VNĐ</p>
        <p>Còn lại: <span id="ticket-stock">0</span> vé</p>
    </div>

    <div id="hold-status" class="hold-status" style="display:none;">
        <span id="hold-status-text">Đang giữ chỗ...</span>
        <span class="time" id="hold-countdown">--:--</span>
    </div>

    <form id="checkout-form">
        <div class="form-group">
            <label for="quantity">Số lượng vé:</label>
            <input type="number" id="quantity" value="1" min="1" max="10" required>
        </div>

        <div class="form-group">
            <label for="voucher-select">Chọn mã giảm giá (Voucher):</label>
            <select id="voucher-select">
                <option value="">-- Không áp dụng voucher --</option>
            </select>
        </div>

        <!-- Bảng tính giá tạm tính -->
        <div class="price-summary">
            <div class="price-row">
                <span>Tổng tiền vé:</span>
                <span><span id="subtotal-val">0</span> VNĐ</span>
            </div>
            <div class="price-row">
                <span>Giảm giá:</span>
                <span style="color: #ff4d4d;">-<span id="discount-val">0</span> VNĐ</span>
            </div>
            <div class="price-row total">
                <span>Thành tiền:</span>
                <span><span id="final-val">0</span> VNĐ</span>
            </div>
        </div>

        <div id="error-message" class="error-msg"></div>

        <button type="submit" id="btn-submit" class="btn-primary" style="width: 100%; padding: 12px; cursor: pointer;">
            Đặt vé ngay
        </button>
    </form>
</div>

<script>
    const token = localStorage.getItem("token");
    const ticketId = sessionStorage.getItem("checkout_ticket_id");

    let ticketUnitPrice = 0;
    let availableVouchers = [];
    let holdCountdownInterval = null;
    let quantityDebounceTimer = null;

    if (!token) {
        alert("Vui lòng đăng nhập trước khi đặt vé!");
        location.href = "/login";
    }
    if (!ticketId) {
        alert("Chưa chọn loại vé nào!");
        location.href = "/";
    }

    function handleUnauthorized(res) {
        if (res.status === 401) {
            alert("Hết phiên đăng nhập, vui lòng đăng nhập lại.");
            location.href = "/login";
            return true;
        }
        return false;
    }

    async function extractErrorMessage(res, fallback) {
        try {
            const errData = await res.json();
            if (errData && errData.message) return errData.message;
        } catch (_) { /* body không phải JSON hợp lệ -> dùng fallback */ }
        return fallback + " (mã lỗi: " + res.status + ")";
    }

    function setHoldStatus(text, isError) {
        const box = document.getElementById("hold-status");
        box.style.display = "flex";
        box.classList.toggle("error", !!isError);
        document.getElementById("hold-status-text").innerText = text;
    }

    function currentQuantity() {
        return parseInt(document.getElementById("quantity").value) || 1;
    }

    function startHoldCountdown(expiresAtIso) {
        if (holdCountdownInterval) clearInterval(holdCountdownInterval);
        const expiresAt = new Date(expiresAtIso).getTime();

        function tick() {
            const remainingMs = expiresAt - Date.now();
            const el = document.getElementById("hold-countdown");
            if (remainingMs <= 0) {
                el.innerText = "hết hạn";
                setHoldStatus("Lượt giữ chỗ đã hết hạn — đang giữ lại...", true);
                clearInterval(holdCountdownInterval);
                // Tự động thử giữ chỗ lại (vé có thể đã hết nếu flash sale căng, lúc đó sẽ báo lỗi).
                ensureHold(currentQuantity(), true).catch(err => {
                    document.getElementById("error-message").innerText = err.message;
                });
                return;
            }
            const totalSec = Math.floor(remainingMs / 1000);
            const mm = String(Math.floor(totalSec / 60)).padStart(2, "0");
            const ss = String(totalSec % 60).padStart(2, "0");
            el.innerText = `${mm}:${ss}`;
        }
        tick();
        holdCountdownInterval = setInterval(tick, 1000);
    }

    // -----------------------------------------------------------------
    // GIỮ CHỖ (Hold): tạo ngay khi vào trang, tạo lại khi đổi số lượng.
    //
    // FIX: state lưu ở localStorage (khoá theo ticketId) thay vì sessionStorage, và LUÔN kiểm
    // tra "hold hiện có còn dùng được không" (đúng quantity + chưa hết hạn theo đồng hồ máy
    // user) TRƯỚC KHI gọi bất kỳ API nào. Trước đây mỗi lần load lại trang hoặc đổi số lượng
    // đều release-rồi-create dù cấu hình không đổi, gây ra rất nhiều bản ghi RELEASED thừa.
    // Giờ nếu hold cũ vẫn khớp và còn hạn -> dùng lại luôn, KHÔNG gọi API nào cả.
    // -----------------------------------------------------------------
    function holdStorageKey() {
        return `hold_state_${ticketId}`;
    }

    function loadStoredHold() {
        try {
            const raw = localStorage.getItem(holdStorageKey());
            return raw ? JSON.parse(raw) : null;
        } catch (_) {
            return null;
        }
    }

    function saveStoredHold(holdId, quantity, expiresAt) {
        localStorage.setItem(holdStorageKey(), JSON.stringify({ holdId, quantity, expiresAt }));
    }

    function clearStoredHold() {
        localStorage.removeItem(holdStorageKey());
    }

    async function ensureHold(quantity, force) {
        const stored = loadStoredHold();
        const stillValid = stored
            && stored.quantity === quantity
            && new Date(stored.expiresAt).getTime() > Date.now();

        if (!force && stillValid) {
            // Hold cũ vẫn đúng quantity và chưa hết hạn -> dùng lại, KHÔNG gọi API.
            setHoldStatus("Đã giữ chỗ cho bạn trong:", false);
            document.getElementById("btn-submit").disabled = false;
            startHoldCountdown(stored.expiresAt);
            return stored.holdId;
        }

        if (stored && stored.holdId) {
            await releaseHoldQuietly(stored.holdId);
        }

        setHoldStatus("Đang giữ chỗ...", false);

        const idempotencyKey = crypto.randomUUID();
        const res = await fetch("/api/holds", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token,
                "Idempotency-Key": idempotencyKey
            },
            body: JSON.stringify({ ticketCategoryId: parseInt(ticketId), quantity })
        });

        if (handleUnauthorized(res)) return null;
        if (!res.ok) {
            setHoldStatus("Không thể giữ chỗ — có thể vé đã hết", true);
            document.getElementById("btn-submit").disabled = true;
            throw new Error(await extractErrorMessage(res, "Không thể giữ chỗ vé"));
        }

        const hold = await res.json();
        saveStoredHold(hold.id, quantity, hold.expiresAt);

        setHoldStatus("Đã giữ chỗ cho bạn trong:", false);
        document.getElementById("btn-submit").disabled = false;
        startHoldCountdown(hold.expiresAt);
        return hold.id;
    }

    // Huỷ hold cũ khi thực sự đổi số lượng (hoặc hold cũ đã hết hạn) — best-effort, không chặn
    // luồng nếu lỗi (hold có thể đã tự hết hạn/bị scheduler dọn rồi; releaseHold ở backend là
    // thao tác idempotent nên gọi lại vẫn an toàn).
    async function releaseHoldQuietly(holdId) {
        try {
            await fetch(`/api/holds/${holdId}`, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
        } catch (e) {
            console.warn("Không thể huỷ hold cũ:", e);
        }
        clearStoredHold();
    }

    // Load Thông tin vé + Danh sách Voucher, khôi phục lại số lượng đã chọn trước đó (nếu còn
    // hold hợp lệ cho ticket này), rồi giữ chỗ với đúng số lượng đó.
    //
    // FIX: input quantity có value="1" cứng trong HTML -> mỗi lần load lại trang nó luôn hiện
    // về 1, dù localStorage vẫn đang nhớ hold cũ với quantity khác (ví dụ 2) -> ensureHold thấy
    // lệch signature nên lại huỷ hold đúng đang giữ để tạo hold sai cho quantity=1. Phải khôi
    // phục giá trị input TRƯỚC khi gọi ensureHold để nó nhận ra hold cũ vẫn khớp và tái sử dụng.
    async function initPage() {
        try {
            await Promise.all([loadTicketInfo(), loadVouchers()]);

            const stored = loadStoredHold();
            const stillValid = stored && new Date(stored.expiresAt).getTime() > Date.now();
            if (stillValid) {
                document.getElementById("quantity").value = stored.quantity;
            }

            calculateTotal();
            await ensureHold(currentQuantity());
        } catch (err) {
            console.error(err);
            document.getElementById("error-message").innerText = "Lỗi khởi tạo: " + err.message;
        }
    }

    async function loadTicketInfo() {
        const res = await fetch(`/api/ticket-categories/${ticketId}`, {
            headers: { "Authorization": "Bearer " + token }
        });
        if (handleUnauthorized(res)) return;
        if (res.status === 404) {
            alert("Loại vé không tồn tại!");
            location.href = "/";
            return;
        }
        if (!res.ok) throw new Error("Không thể tải thông tin vé");

        const ticket = await res.json();
        ticketUnitPrice = ticket.price;

        document.getElementById("ticket-name").innerText = ticket.name;
        document.getElementById("ticket-price").innerText = Number(ticket.price).toLocaleString("vi-VN");
        document.getElementById("ticket-stock").innerText = ticket.availableQuantity;
        document.getElementById("quantity").max = ticket.availableQuantity;
    }

    async function loadVouchers() {
        const res = await fetch("/api/vouchers/available", {
            headers: { "Authorization": "Bearer " + token }
        });
        if (handleUnauthorized(res)) return;
        if (!res.ok) return; // Nếu lỗi nhẹ lấy voucher thì vẫn cho đặt không voucher

        availableVouchers = await res.json();
        const selectEl = document.getElementById("voucher-select");

        availableVouchers.forEach(v => {
            const option = document.createElement("option");
            option.value = v.code;

            let labelText = `[${v.code}] - `;
            if (v.discountType === "PERCENTAGE") {
                labelText += `Giảm ${v.discountValue}%`;
            } else {
                labelText += `Giảm ${Number(v.discountValue).toLocaleString("vi-VN")} VNĐ`;
            }
            option.textContent = labelText;
            selectEl.appendChild(option);
        });
    }

    function calculateTotal() {
        const qty = currentQuantity();
        const subtotal = ticketUnitPrice * qty;

        const selectedCode = document.getElementById("voucher-select").value;
        const voucher = availableVouchers.find(v => v.code === selectedCode);

        let discount = 0;
        if (voucher) {
            if (voucher.discountType === "PERCENTAGE") {
                discount = (subtotal * voucher.discountValue) / 100;
            } else {
                discount = voucher.discountValue;
            }
        }
        if (discount > subtotal) discount = subtotal;

        const finalAmount = subtotal - discount;

        document.getElementById("subtotal-val").innerText = Number(subtotal).toLocaleString("vi-VN");
        document.getElementById("discount-val").innerText = Number(discount).toLocaleString("vi-VN");
        document.getElementById("final-val").innerText = Number(finalAmount).toLocaleString("vi-VN");
    }

    document.getElementById("quantity").addEventListener("input", calculateTotal);
    document.getElementById("quantity").addEventListener("change", () => {
        // 'change' chỉ bắn khi giá trị được "chốt" (rời ô nhập, hoặc bấm mũi tên tăng/giảm) —
        // không bắn liên tục theo từng phím gõ như 'input', nên giảm hẳn số lần gọi API giữ chỗ.
        clearTimeout(quantityDebounceTimer);
        quantityDebounceTimer = setTimeout(() => {
            ensureHold(currentQuantity()).catch(err => {
                document.getElementById("error-message").innerText = err.message;
            });
        }, 300);
    });
    document.getElementById("voucher-select").addEventListener("change", calculateTotal);
    // Đổi voucher KHÔNG cần tạo lại hold — voucher chỉ được áp dụng ở bước confirm,
    // hold chỉ quan tâm ticketCategoryId + quantity.

    initPage();

    document.getElementById("checkout-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const btnSubmit = document.getElementById("btn-submit");
        const errorDiv = document.getElementById("error-message");
        errorDiv.innerText = "";

        const holdId = loadStoredHold()?.holdId;
        if (!holdId) {
            errorDiv.innerText = "Chưa giữ được chỗ cho vé này, vui lòng thử lại.";
            return;
        }

        btnSubmit.disabled = true;
        btnSubmit.innerText = "Đang xử lý...";

        const voucherCode = document.getElementById("voucher-select").value;

        try {
            // Confirm hold -> tạo Booking + Payment thật. Không cần gửi Idempotency-Key riêng ở
            // đây: backend tự sinh key cho Booking từ chính holdId, nên bấm lại nhiều lần (mạng
            // lag, double-click) vẫn an toàn, không tạo booking trùng.
            const response = await fetch(`/api/holds/${holdId}/confirm`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ voucherCode: voucherCode !== "" ? voucherCode : null })
            });

            if (handleUnauthorized(response)) return;

            if (!response.ok) {
                throw new Error(await extractErrorMessage(response, "Xác nhận đặt vé thất bại"));
            }

            const result = await response.json();

            if (holdCountdownInterval) clearInterval(holdCountdownInterval);
            clearStoredHold();
            sessionStorage.removeItem("checkout_ticket_id");

            location.href = `/payment?id=${result.id}`;

        } catch (error) {
            console.error(error);
            errorDiv.innerText = error.message;
            btnSubmit.disabled = false;
            btnSubmit.innerText = "Đặt vé ngay";
        }
    });
</script>
</body>
</html>
