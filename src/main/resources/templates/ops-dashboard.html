<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Dashboard - StageHub</title>
    <!-- Giữ nguyên styles.css gốc -->
    <link rel="stylesheet" href="/css/styles.css">
    <!-- Thêm dashboard.css riêng -->
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

<div class="navbar header">
    <!-- Đã xoá StageHub và Operator Dashboard ở giữa -->
    <div class="nav-actions" id="navbar-actions"></div>
</div>

<div class="container home-container">
    <h1>Operator dashboard</h1>
    <p style="color: var(--text-secondary); margin-top:6px;">Tạo concert mới và quản lý vòng đời trạng thái (DRAFT → PUBLISHED → COMPLETED, hoặc hủy).</p>

    <div id="access-warning"></div>

    <div id="ops-content" style="display:none;">
        <div class="ops-layout">

            <!-- Cột trái: Form tạo concert -->
            <div class="panel">
                <h2 style="margin-bottom:6px;">Tạo concert mới</h2>

                <div id="create-error-box"></div>
                <div id="create-success-box"></div>

                <form id="create-form">
                    <div class="field">
                        <label for="c-name">Tên concert</label>
                        <input type="text" id="c-name" required>
                    </div>
                    <div class="field">
                        <label for="c-venue">Địa điểm</label>
                        <input type="text" id="c-venue" required>
                    </div>
                    <div class="field">
                        <label for="c-date">Ngày giờ diễn (eventDate)</label>
                        <input type="datetime-local" id="c-date" required>
                    </div>
                    <div class="field">
                        <label for="c-desc">Mô tả (không bắt buộc)</label>
                        <textarea id="c-desc" rows="3"></textarea>
                    </div>
                    <div class="field">
                        <label for="c-poster">Poster URL (không bắt buộc)</label>
                        <input type="text" id="c-poster" placeholder="https://...">
                    </div>

                    <label style="margin-bottom: 8px; display: block;">Hạng mục vé (ticketCategories)</label>
                    <div id="ticket-rows"></div>
                    <button type="button" class="btn-ghost" id="add-ticket-row" style="margin-bottom:20px; width: 100%;">+ Thêm hạng mục vé</button>

                    <button type="submit" class="btn-primary" style="width:100%;" id="create-submit-btn">Tạo concert (DRAFT)</button>
                </form>
            </div>

            <!-- Cột phải: Bảng quản lý status -->
            <div class="panel">
                <h2 style="margin-bottom:6px;">Quản lý trạng thái concert</h2>
                <p style="color: var(--text-secondary); font-size:13.5px; margin-bottom:16px;">
                    <code>PATCH /api/ops/concerts/{id}/status</code> — Chỉ cho phép chuyển đúng vòng đời.
                </p>
                <div id="status-error-box"></div>
                <div id="concert-table-wrap">
                    <div class="empty-state">Đang tải danh sách concert...</div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // =========================================================================
    // PART 1: API & AUTH HELPERS
    // =========================================================================

    function getAuth() {
        const token = localStorage.getItem("token");
        if (!token) return null;
        return {
            token: token,
            username: localStorage.getItem("username"),
            role: localStorage.getItem("role"),
            userId: localStorage.getItem("userId")
        };
    }

    function setAuth(authResponse) {
        if (!authResponse) return;
        localStorage.setItem("token", authResponse.token);
        localStorage.setItem("username", authResponse.username);
        localStorage.setItem("role", authResponse.role);
        localStorage.setItem("userId", authResponse.userId);
    }

    function clearAuth() {
        localStorage.removeItem("token");
        localStorage.removeItem("username");
        localStorage.removeItem("role");
        localStorage.removeItem("userId");
    }

    function isLoggedIn() {
        return !!getAuth();
    }

    function hasRole(...roles) {
        const auth = getAuth();
        return !!auth && roles.includes(auth.role);
    }

    async function apiFetch(path, options = {}) {
        const auth = getAuth();
        const headers = Object.assign(
            { 'Content-Type': 'application/json' },
            options.headers || {}
        );
        if (auth && auth.token) {
            headers['Authorization'] = `Bearer ${auth.token}`;
        }

        const res = await fetch(path, Object.assign({}, options, { headers }));

        let body = null;
        const text = await res.text();
        if (text) {
            try { body = JSON.parse(text); } catch (e) { body = text; }
        }

        if (!res.ok) {
            const message = (body && body.message) ? body.message : `Lỗi ${res.status}`;
            const err = new Error(message);
            err.status = res.status;
            err.body = body;
            throw err;
        }

        return body;
    }

    function renderNavbar(containerId = 'navbar-actions') {
        const el = document.getElementById(containerId);
        if (!el) return;

        const auth = getAuth();

        if (!auth) {
            el.innerHTML = `
            <a href="/login" class="btn-ghost">Đăng nhập</a>
            <a href="/register" class="btn-primary">Đăng ký</a>
        `;
            return;
        }

        let opsLink = '';
        if (auth.role === 'OPERATOR' || auth.role === 'ADMIN') {
            opsLink = `<a href="/ops/dashboard" class="btn-ghost">Operator dashboard</a>`;
        }

        el.innerHTML = `
        ${opsLink}
        <span style="color: var(--text-secondary); font-size: 14px; margin: 0 8px;">${escapeHtml(auth.username)} · ${escapeHtml(auth.role)}</span>
        <button class="btn-ghost" id="logout-btn">Đăng xuất</button>
    `;

        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                clearAuth();
                window.location.href = '/';
            });
        }
    }

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;');
    }

    function formatDateTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleString('vi-VN', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }

    document.addEventListener('DOMContentLoaded', () => renderNavbar());

    // =========================================================================
    // PART 2: OPERATOR DASHBOARD LOGIC
    // =========================================================================

    const ALLOWED_TRANSITIONS = {
        DRAFT: ['PUBLISHED', 'CANCELLED'],
        PUBLISHED: ['CANCELLED', 'COMPLETED'],
        CANCELLED: [],
        COMPLETED: []
    };

    const badgeClass = {
        PUBLISHED: 'badge-published',
        DRAFT: 'badge-draft',
        CANCELLED: 'badge-cancelled',
        COMPLETED: 'badge-completed'
    };

    let ticketRowCount = 0;

    function addTicketRow(prefill) {
        ticketRowCount++;
        const rowId = `ticket-row-${ticketRowCount}`;
        const wrap = document.getElementById('ticket-rows');
        const div = document.createElement('div');
        div.className = 'ticket-row';
        div.id = rowId;
        div.innerHTML = `
        <div class="field">
            <label>Tên hạng</label>
            <input type="text" class="tc-name" placeholder="VIP..." value="${prefill?.name || ''}">
        </div>
        <div class="field">
            <label>Giá (VND)</label>
            <input type="number" class="tc-price" min="0" step="1000" value="${prefill?.price || ''}">
        </div>
        <div class="field">
            <label>Số vé</label>
            <input type="number" class="tc-qty" min="1" step="1" value="${prefill?.qty || ''}">
        </div>
        <button type="button" class="icon-btn" title="Xóa" onclick="document.getElementById('${rowId}').remove()">✕</button>
    `;
        wrap.appendChild(div);
    }

    document.getElementById('add-ticket-row').addEventListener('click', () => addTicketRow());

    function collectTicketCategories() {
        const rows = document.querySelectorAll('#ticket-rows .ticket-row');
        const categories = [];
        rows.forEach(row => {
            const name = row.querySelector('.tc-name').value.trim();
            const price = row.querySelector('.tc-price').value;
            const qty = row.querySelector('.tc-qty').value;
            if (name || price || qty) {
                categories.push({
                    name,
                    price: price ? Number(price) : null,
                    totalQuantity: qty ? Number(qty) : null
                });
            }
        });
        return categories;
    }

    function checkAccess() {
        const warningBox = document.getElementById('access-warning');
        const content = document.getElementById('ops-content');

        if (!isLoggedIn()) {
            warningBox.innerHTML = `<div class="alert alert-error">Bạn cần đăng nhập bằng tài khoản OPERATOR hoặc ADMIN. <a href="/login">Đăng nhập</a></div>`;
            return false;
        }
        if (!hasRole('OPERATOR', 'ADMIN')) {
            warningBox.innerHTML = `<div class="alert alert-error">Tài khoản của bạn không có quyền OPERATOR/ADMIN.</div>`;
            return false;
        }
        content.style.display = 'block';
        return true;
    }

    document.getElementById('create-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorBox = document.getElementById('create-error-box');
        const successBox = document.getElementById('create-success-box');
        const submitBtn = document.getElementById('create-submit-btn');
        errorBox.innerHTML = '';
        successBox.innerHTML = '';

        const eventDateRaw = document.getElementById('c-date').value;
        const payload = {
            name: document.getElementById('c-name').value.trim(),
            venue: document.getElementById('c-venue').value.trim(),
            eventDate: eventDateRaw ? `${eventDateRaw}:00` : null,
            description: document.getElementById('c-desc').value.trim() || null,
            posterUrl: document.getElementById('c-poster').value.trim() || null,
            ticketCategories: collectTicketCategories()
        };

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span>';

        try {
            const res = await apiFetch('/api/ops/concerts', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            successBox.innerHTML = `<div class="alert alert-success">Đã tạo concert #${res.concertId} thành công.</div>`;
            document.getElementById('create-form').reset();
            document.getElementById('ticket-rows').innerHTML = '';
            addTicketRow();
            loadConcertTable();
        } catch (err) {
            let msg = err.message;
            if (err.body && err.body.fieldErrors) {
                msg = Object.values(err.body.fieldErrors).join(' · ');
            }
            errorBox.innerHTML = `<div class="alert alert-error">${escapeHtml(msg)}</div>`;
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Tạo concert (DRAFT)';
        }
    });

    async function loadConcertTable() {
        const wrap = document.getElementById('concert-table-wrap');
        try {
            const concerts = await apiFetch('/api/ops/concerts');
            renderConcertTable(concerts);
        } catch (err) {
            wrap.innerHTML = `<div class="empty-state">Không tải được danh sách: ${escapeHtml(err.message)}</div>`;
        }
    }

    function renderConcertTable(concerts) {
        const wrap = document.getElementById('concert-table-wrap');

        if (!concerts || !concerts.length) {
            wrap.innerHTML = '<div class="empty-state">Chưa có concert nào. Tạo concert đầu tiên ở bên trái.</div>';
            return;
        }

        const rows = concerts.map(c => {
            const nextStates = ALLOWED_TRANSITIONS[c.status] || [];
            const options = nextStates.map(s => `<option value="${s}">${s}</option>`).join('');
            const canTransition = nextStates.length > 0;

            return `
            <tr>
                <td>
                    <a href="/concert/${c.id}">${escapeHtml(c.name)}</a><br>
                    <span style="color: var(--text-secondary); font-size:12px;">#${c.id} · ${escapeHtml(c.venue)}</span>
                </td>
                <td><span class="badge ${badgeClass[c.status] || ''}">${escapeHtml(c.status)}</span></td>
                <td>${formatDateTime(c.eventDate)}</td>
                <td>
                    ${canTransition ? `
                        <div style="display:flex; gap:8px;">
                            <select class="status-select" data-concert-id="${c.id}">
                                ${options}
                            </select>
                            <button class="btn-primary" style="padding:6px 12px; font-size:12px;" onclick="submitStatusChange(${c.id}, this)">Cập nhật</button>
                        </div>
                    ` : `<span style="color: var(--text-secondary); font-size:13px;">Không thể đổi</span>`}
                </td>
            </tr>
        `;
        }).join('');

        wrap.innerHTML = `
        <table class="ops-table">
            <thead>
                <tr><th>Concert</th><th>Trạng thái</th><th>Ngày diễn</th><th>Cập nhật</th></tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    `;
    }

    async function submitStatusChange(concertId, buttonEl) {
        const errorBox = document.getElementById('status-error-box');
        errorBox.innerHTML = '';

        const select = document.querySelector(`select[data-concert-id="${concertId}"]`);
        const newStatus = select.value;

        buttonEl.disabled = true;
        const originalText = buttonEl.innerText;
        buttonEl.innerHTML = '<span class="spinner"></span>';

        try {
            await apiFetch(`/api/ops/concerts/${concertId}/status`, {
                method: 'PATCH',
                body: JSON.stringify({ status: newStatus })
            });
            loadConcertTable();
        } catch (err) {
            errorBox.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
            buttonEl.disabled = false;
            buttonEl.innerText = originalText;
        }
    }

    if (checkAccess()) {
        addTicketRow();
        loadConcertTable();
    }
</script>
</body>
</html>
